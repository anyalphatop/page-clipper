<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Clipper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      padding: 20px 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 15px;
      color: #1a1a1a;
      background: #fff;
    }

    .section { padding: 20px 0; }

    .section + .section { border-top: 1px solid #e8e8e8; }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #111;
      margin-bottom: 16px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
      margin-bottom: 14px;
    }

    .field:last-child { margin-bottom: 0; }

    label {
      font-size: 13px;
      color: #555;
    }

    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #d0d0d0;
      border-radius: 7px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    input:focus { border-color: #333; }

    button {
      width: 100%;
      padding: 11px;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 20px;
    }

    button:hover { background: #333; }
    button:active { background: #555; }

    .tip {
      margin-top: 10px;
      font-size: 13px;
      color: #999;
      text-align: center;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="section">
    <div class="section-title">Page Clipper</div>
    <div class="field">
      <label for="token">令牌</label>
      <input id="token" type="password" placeholder="请输入令牌" />
    </div>
  </div>

  <div class="section">
    <div class="section-title">飞书</div>
    <div class="field">
      <label for="appId">App ID</label>
      <input id="appId" type="text" placeholder="请输入飞书应用 App ID" />
    </div>
    <div class="field">
      <label for="appSecret">App Secret</label>
      <input id="appSecret" type="password" placeholder="请输入飞书应用 App Secret" />
    </div>
  </div>

  <button id="save">保存</button>
  <p class="tip" id="tip"></p>

  <script>
    const saveBtn = document.getElementById("save");

    saveBtn.addEventListener("click", () => {
    });
  </script>
</body>
</html>
